<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Run.Jeremy Candle Tools</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  background: radial-gradient(circle at top, #111, #000);
  font-family: 'Orbitron', sans-serif;
  color: #8dff8d;
}

.watch {
  max-width: 420px;
  width: 100%;
  padding: 20px;
  border-radius: 30px;
  background: #0a0a0a;
  border: 2px solid #2f2f2f;
  box-shadow: 0 0 30px rgba(0,255,120,0.1);
}

.header {
  display: flex;
  justify-content: space-between;
  font-size: 0.7rem;
  margin-bottom: 10px;
}

.screen {
  background: #081308;
  border-radius: 15px;
  padding: 15px;
  border: 1px solid #284228;
}

h1 {
  text-align: center;
  font-size: 1.1rem;
  margin-bottom: 5px;
}

.sub {
  text-align: center;
  font-size: 0.6rem;
  margin-bottom: 15px;
  opacity: 0.7;
}

.main-output {
  font-size: 1.6rem;
  text-align: center;
  margin-bottom: 12px;
  text-shadow: 0 0 10px rgba(141,255,141,0.4);
}

input {
  width: 100%;
  padding: 10px;
  margin-bottom: 10px;
  background: #0a120a;
  border: 1px solid #2b4a2b;
  color: #98ff98;
  border-radius: 8px;
}

.load-buttons {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
  margin-bottom: 10px;
}

.load-buttons button {
  padding: 10px;
  background: #111;
  border: 1px solid #2d2d2d;
  color: #8dff8d;
  border-radius: 8px;
  cursor: pointer;
}

.load-buttons button.active {
  border: 1px solid #8dff8d;
  box-shadow: 0 0 10px rgba(141,255,141,0.3);
}

.action-buttons {
  display: flex;
  gap: 10px;
  margin-top: 10px;
}

.action-buttons button {
  flex: 1;
  padding: 10px;
  background: #111;
  border: 1px solid #2d2d2d;
  color: #8dff8d;
  border-radius: 8px;
  cursor: pointer;
}

.results {
  margin-top: 10px;
  font-size: 0.8rem;
}

.footer {
  text-align: center;
  margin-top: 15px;
  font-size: 0.6rem;
  opacity: 0.6;
}
</style>
</head>

<body>

<div class="watch">
  <div class="header">
    <div>RUN.JEREMY</div>
    <div>BATCH MODE</div>
  </div>

  <div class="screen">
    <h1>WAX CALC</h1>
    <div class="sub">Candle Composition Engine</div>

    <div class="main-output" id="mainOutput">--</div>

    <input id="vessel" type="number" placeholder="Vessel Size (oz)">
    <input id="count" type="number" placeholder="Quantity">

    <div class="load-buttons">
      <button onclick="setLoad(6, this)">Light 6%</button>
      <button onclick="setLoad(8, this)">Medium 8%</button>
      <button onclick="setLoad(10, this)">Strong 10%</button>
      <button onclick="setLoad(12, this)">Overload 12%</button>
    </div>

    <div class="action-buttons">
      <button onclick="calculate()">Calculate</button>
      <button onclick="resetCalc()">Reset</button>
    </div>

    <div class="results" id="results"></div>
  </div>

  <div class="footer">Candle Tools • run.jeremy</div>
</div>

<script>
let selectedLoad = null;

function setLoad(value, btn) {
  selectedLoad = value;

  document.querySelectorAll(".load-buttons button")
    .forEach(b => b.classList.remove("active"));

  btn.classList.add("active");
}

function calculate() {
  const vessel = parseFloat(document.getElementById("vessel").value);
  const count = parseFloat(document.getElementById("count").value);

  if (!vessel || !count || !selectedLoad) {
    alert("Enter all values");
    return;
  }

  const total = vessel * count;
  const fragrance = total * (selectedLoad / 100);
  const wax = total - fragrance;

  document.getElementById("mainOutput").innerText =
    wax.toFixed(1) + " oz WAX";

  document.getElementById("results").innerHTML = `
    Total: ${total.toFixed(2)} oz<br>
    Fragrance: ${fragrance.toFixed(2)} oz
  `;
}

function resetCalc() {
  document.getElementById("vessel").value = "";
  document.getElementById("count").value = "";
  document.getElementById("results").innerHTML = "";
  document.getElementById("mainOutput").innerText = "--";
  selectedLoad = null;

  document.querySelectorAll(".load-buttons button")
    .forEach(b => b.classList.remove("active"));
}
</script>

</body>
</html>
