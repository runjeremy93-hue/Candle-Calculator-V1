<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Run.Jeremy Watch Calculator</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700&display=swap" rel="stylesheet">

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background:
        radial-gradient(circle at top, #111 0%, #050505 45%, #000 100%);
      font-family: 'Orbitron', sans-serif;
      color: #8dff8d;
      padding: 20px;
    }

    .watch-shell {
      width: 100%;
      max-width: 500px;
      position: relative;
    }

    .watch-shell::before,
    .watch-shell::after {
      content: "";
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      width: 210px;
      height: 46px;
      background: linear-gradient(180deg, #1b1b1b, #080808);
      border: 2px solid #2a2a2a;
      z-index: 0;
      box-shadow: inset 0 0 10px rgba(255,255,255,0.03);
    }

    .watch-shell::before {
      top: -28px;
      border-radius: 18px 18px 8px 8px;
    }

    .watch-shell::after {
      bottom: -28px;
      border-radius: 8px 8px 18px 18px;
    }

    .watch-face {
      position: relative;
      z-index: 1;
      background: linear-gradient(180deg, #151515 0%, #090909 100%);
      border: 3px solid #2f2f2f;
      border-radius: 36px;
      padding: 22px;
      box-shadow:
        0 0 0 3px #050505,
        0 0 30px rgba(0, 255, 120, 0.08),
        inset 0 0 20px rgba(255,255,255,0.03);
    }

    .watch-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 0.72rem;
      color: #6ce96c;
      margin-bottom: 14px;
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    .brand {
      opacity: 0.9;
    }

    .status {
      opacity: 0.7;
    }

    .screen {
      background: linear-gradient(180deg, #0f1f0f 0%, #081308 100%);
      border: 2px solid #243824;
      border-radius: 18px;
      padding: 18px;
      box-shadow:
        inset 0 0 18px rgba(141, 255, 141, 0.08),
        0 0 12px rgba(141, 255, 141, 0.06);
      margin-bottom: 18px;
    }

    h1 {
      margin: 0 0 6px 0;
      font-size: 1.2rem;
      text-align: center;
      letter-spacing: 2px;
      color: #9aff9a;
      text-shadow: 0 0 8px rgba(154, 255, 154, 0.35);
    }

    .subtext {
      margin: 0 0 16px 0;
      text-align: center;
      font-size: 0.65rem;
      color: #72db72;
      letter-spacing: 1.5px;
      text-transform: uppercase;
    }

    .display-grid {
      display: grid;
      gap: 12px;
    }

    label {
      display: block;
      font-size: 0.68rem;
      margin-bottom: 6px;
      color: #7df77d;
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    input,
    select {
      width: 100%;
      padding: 12px 12px;
      border-radius: 10px;
      border: 1px solid #2b4a2b;
      background: #0a120a;
      color: #98ff98;
      font-family: 'Orbitron', sans-serif;
      font-size: 0.9rem;
      outline: none;
      box-shadow: inset 0 0 8px rgba(141,255,141,0.04);
    }

    input::placeholder {
      color: #4d7f4d;
    }

    select {
      appearance: none;
    }

    .button-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 16px;
    }

    button {
      border: 1px solid #2d2d2d;
      border-radius: 12px;
      padding: 12px;
      background: linear-gradient(180deg, #1a1a1a 0%, #0b0b0b 100%);
      color: #98ff98;
      font-family: 'Orbitron', sans-serif;
      font-size: 0.78rem;
      letter-spacing: 1px;
      cursor: pointer;
      text-transform: uppercase;
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,0.04),
        0 0 10px rgba(0,0,0,0.35);
      transition: transform 0.15s ease, box-shadow 0.15s ease;
    }

    button:hover {
      transform: translateY(-1px);
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,0.05),
        0 0 16px rgba(141,255,141,0.08);
    }

    .results {
      margin-top: 16px;
      background: linear-gradient(180deg, #0e1b0e 0%, #091109 100%);
      border: 1px solid #284228;
      border-radius: 14px;
      padding: 14px;
      display: none;
      box-shadow: inset 0 0 14px rgba(141,255,141,0.05);
    }

    .results-line {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      padding: 7px 0;
      border-bottom: 1px solid rgba(141,255,141,0.08);
      font-size: 0.78rem;
      letter-spacing: 0.6px;
    }

    .results-line:last-child {
      border-bottom: none;
      padding-bottom: 0;
    }

    .results-label {
      color: #74e574;
      text-transform: uppercase;
    }

    .results-value {
      color: #b6ffb6;
      text-align: right;
    }

    .warning {
      margin-top: 12px;
      font-size: 0.68rem;
      color: #c2ffc2;
      text-transform: uppercase;
      letter-spacing: 1px;
      opacity: 0.82;
      text-shadow: 0 0 6px rgba(141,255,141,0.18);
    }

    .watch-bottom {
      margin-top: 14px;
      display: flex;
      justify-content: center;
      gap: 8px;
    }

    .sensor {
      width: 42px;
      height: 6px;
      border-radius: 999px;
      background: #111;
      border: 1px solid #2a2a2a;
      box-shadow: inset 0 0 6px rgba(141,255,141,0.06);
    }

    @media (max-width: 520px) {
      .watch-face {
        padding: 18px;
        border-radius: 28px;
      }

      .watch-shell::before,
      .watch-shell::after {
        width: 160px;
      }

      h1 {
        font-size: 1rem;
      }

      button {
        font-size: 0.7rem;
      }

      .results-line {
        font-size: 0.72rem;
      }
    }
  </style>
</head>
<body>
  <div class="watch-shell">
    <div class="watch-face">
      <div class="watch-top">
        <div class="brand">RUN.JEREMY</div>
        <div class="status">BATCH MODE</div>
      </div>

      <div class="screen">
        <h1>WAX CALC</h1>
        <p class="subtext">Retro formula console</p>

        <div class="display-grid">
          <div>
            <label for="vessel">Vessel Size OZ</label>
            <input id="vessel" type="number" placeholder="8">
          </div>

          <div>
            <label for="count">Qty</label>
            <input id="count" type="number" placeholder="12">
          </div>

          <div>
            <label for="load">Fragrance Load</label>
            <select id="load">
              <option value="">Select mode</option>
              <option value="6">Light 6%</option>
              <option value="8">Medium 8%</option>
              <option value="10">Strong 10%</option>
              <option value="12">Overload Melt 12%</option>
            </select>
          </div>
        </div>

        <div class="button-row">
          <button onclick="calculate()">Calculate</button>
          <button onclick="resetCalc()">Reset</button>
        </div>

        <div class="results" id="results"></div>
      </div>

      <div class="watch-bottom">
        <div class="sensor"></div>
        <div class="sensor"></div>
        <div class="sensor"></div>
      </div>
    </div>
  </div>

  <script>
    function calculate() {
      const vessel = parseFloat(document.getElementById("vessel").value);
      const count = parseFloat(document.getElementById("count").value);
      const load = parseFloat(document.getElementById("load").value);

      if (!vessel || !count || !load) {
        alert("Enter vessel size, quantity, and fragrance load.");
        return;
      }

      const total = vessel * count;
      const fragrance = total * (load / 100);
      const wax = total - fragrance;

      let label = "";
      if (load === 6) label = "Light";
      if (load === 8) label = "Medium";
      if (load === 10) label = "Strong";
      if (load === 12) label = "Overload Melt";

      let warning = "";
      if (load === 12) {
        warning = "<div class='warning'>High fragrance load for wax melts only</div>";
      }

      const box = document.getElementById("results");
      box.style.display = "block";
      box.innerHTML = `
        <div class="results-line">
          <span class="results-label">Mode</span>
          <span class="results-value">${label} ${load}%</span>
        </div>
        <div class="results-line">
          <span class="results-label">Total Fill</span>
          <span class="results-value">${total.toFixed(2)} oz</span>
        </div>
        <div class="results-line">
          <span class="results-label">Wax Needed</span>
          <span class="results-value">${wax.toFixed(2)} oz</span>
        </div>
        <div class="results-line">
          <span class="results-label">Fragrance</span>
          <span class="results-value">${fragrance.toFixed(2)} oz</span>
        </div>
        ${warning}
      `;
    }

    function resetCalc() {
      document.getElementById("vessel").value = "";
      document.getElementById("count").value = "";
      document.getElementById("load").value = "";
      document.getElementById("results").style.display = "none";
      document.getElementById("results").innerHTML = "";
    }
  </script>
</body>
</html>
