<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Candle Calculator</title>

  <style>
   body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: linear-gradient(135deg, #f5efe6, #e9dfd1);
  color: #3a2f25;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

/* Main card */
.card {
  width: 400px;
  padding: 25px;
  border-radius: 20px;
  background: #fffaf3;
  box-shadow: 0 10px 30px rgba(0,0,0,0.08);
}

/* Title */
h1 {
  text-align: center;
  color: #3a2f25;
}

/* Labels */
label {
  display: block;
  margin-top: 15px;
  font-weight: 600;
}

/* Inputs */
input, select {
  width: 100%;
  padding: 12px;
  margin-top: 5px;
  border-radius: 10px;
  border: 1px solid #ddd2c4;
  background: #fff;
}

/* Button */
button {
  margin-top: 20px;
  width: 100%;
  padding: 14px;
  border: none;
  border-radius: 12px;
  background: linear-gradient(135deg, #c89b3c, #e0b15b);
  color: #2b2118;
  font-weight: bold;
  cursor: pointer;
}

/* Results */
.results {
  margin-top: 20px;
  padding: 15px;
  border-radius: 12px;
  background: #f7efe5;
  display: none;
}    }
  </style>
</head>

<body>
  <div class="card">
    <h1>Candle Calculator</h1>

    <label>Vessel Size (oz)</label>
    <input id="vessel" type="number" placeholder="8">

    <label>Number of Candles or Melts</label>
    <input id="count" type="number" placeholder="12">

    <label>Fragrance Strength</label>
    <select id="load">
      <option value="">Select strength</option>
      <option value="6">Light (6%)</option>
      <option value="8">Medium (8%)</option>
      <option value="10">Strong (10%)</option>
      <option value="12">Overload (Wax Melts) (12%)</option>
    </select>

    <button onclick="calculate()">Calculate</button>

    <div class="results" id="results"></div>
  </div>

  <script>
    function calculate() {
      let vessel = parseFloat(document.getElementById("vessel").value);
      let count = parseFloat(document.getElementById("count").value);
      let load = parseFloat(document.getElementById("load").value);

      if (!vessel || !count || !load) {
        alert("Fill everything out");
        return;
      }

      let total = vessel * count;
      let fragrance = total * (load / 100);
      let wax = total - fragrance;

      let label = "";
      if (load == 6) label = "Light";
      if (load == 8) label = "Medium";
      if (load == 10) label = "Strong";
      if (load == 12) label = "Overload (Wax Melts)";

      let warning = "";
      if (load == 12) {
        warning = "<p style='color:#d4a75c;'>High load for wax melts only</p>";
      }

      let box = document.getElementById("results");
      box.style.display = "block";

      box.innerHTML = `
        <p><b>Strength:</b> ${label} (${load}%)</p>
        <p><b>Total Fill:</b> ${total.toFixed(2)} oz</p>
        <p><b>Wax Needed:</b> ${wax.toFixed(2)} oz</p>
        <p><b>Fragrance Needed:</b> ${fragrance.toFixed(2)} oz</p>
        ${warning}
      `;
    }
  </script>
</body>
</html>
